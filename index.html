<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>the switch. — just show up.</title>
  <meta name="description" content="Managed co-living in Bengaluru. Fully furnished. Zero broker. Walk in with a suitcase.">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <style>

    /* ─── GLOBAL OVERRIDES FOR THIS PAGE ───────────────── */
    body { background: var(--paper); }

    /* Minimal nav: strip it down on homepage */
    .nav { background: transparent !important; box-shadow: none !important; }
    .nav.nav-scrolled { background: rgba(14,13,10,.92) !important; }
    .nav-links { display: none; }
    .nav-cta { display: none; }
    .nav-hamburger { display: none !important; }
    .nav-logo { color: var(--paper) !important; }
    .nav-logo .nav-dot { color: var(--orange) !important; }
    .nav-toggle { background: var(--paper) !important; }
    .nav-toggle::before, .nav-toggle::after { background: var(--paper) !important; }
    /* Single right link */
    .nav-inner::after {
      content: 'homes →';
      font-size: 11px; letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(247,244,239,.45);
      transition: color .2s;
      cursor: pointer;
    }
    .nav-inner:hover::after { color: var(--paper); }
    .nav-inner a[href="/properties.html"]::after { content: 'homes →'; }

    /* ─── HERO ──────────────────────────────────────────── */
    .hero {
      display: grid;
      grid-template-columns: 45% 55%;
      height: 100vh; min-height: 600px;
      position: relative;
      overflow: hidden;
    }

    /* Left dark panel — clean empty space */
    .hero-panel {
      background: var(--ink);
      position: relative;
      z-index: 2;
      display: flex; flex-direction: column;
      justify-content: space-between;
      padding: 0 0 52px 0;
    }
    .hero-panel-top {
      padding: 28px 40px;
      font-size: 9px; letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(247,244,239,.2);
    }
    .hero-panel-bottom {
      padding: 0 40px;
      display: flex; align-items: center; gap: 10px;
    }
    .hero-scroll-line {
      width: 1px; height: 36px;
      background: rgba(247,244,239,.2);
    }
    .hero-scroll-txt {
      font-size: 9px; letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(247,244,239,.2);
    }

    /* Right photo — 100% brightness, zero treatment */
    .hero-photo {
      position: relative; overflow: hidden;
    }
    .hero-photo img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      display: block;
    }

    /* The type: absolutely over the whole hero, bleeds right */
    .hero-type {
      position: absolute;
      bottom: 52px; left: 40px;
      z-index: 10;
      pointer-events: none;
      line-height: 1;
    }
    .hero-h1 {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(88px, 17vw, 220px);
      line-height: .84;
      color: var(--paper);
      letter-spacing: -.04em;
      white-space: nowrap;
      text-shadow: 0 4px 60px rgba(14,13,10,.18);
    }
    .hero-h1 em {
      font-style: italic;
      display: block;
      color: rgba(247,244,239,.75);
    }

    /* ─── NUMBERS ───────────────────────────────────────── */
    .numbers {
      background: var(--paper);
      padding: 160px 56px;
      border-top: 1px solid var(--rule);
    }
    .numbers-inner {
      max-width: 1400px; margin: 0 auto;
      display: grid; grid-template-columns: repeat(3,1fr);
      border-left: 1px solid var(--rule);
    }
    .num-item {
      padding: 0 72px 0 56px;
      border-right: 1px solid var(--rule);
    }
    .num-val {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(80px, 12vw, 160px);
      line-height: .84;
      color: var(--ink);
      letter-spacing: -.04em;
      margin-bottom: 24px;
    }
    .num-val em {
      font-style: italic;
      color: var(--muted);
      font-size: .5em;
    }
    .num-label {
      font-size: 9px; letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ─── PROPERTIES ────────────────────────────────────── */
    .props-section {
      padding: 120px 56px 160px;
      background: var(--ink);
    }
    .props-inner { max-width: 1400px; margin: 0 auto; }
    .props-eyebrow {
      font-size: 9px; letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(247,244,239,.22);
      margin-bottom: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .props-eyebrow a {
      color: rgba(247,244,239,.22);
      transition: color .2s;
    }
    .props-eyebrow a:hover { color: rgba(247,244,239,.6); }
    .props-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 2px;
    }

    /* Art-style property card */
    .prop-art {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      cursor: pointer;
      background: var(--ink-2);
    }
    .prop-art img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .9s cubic-bezier(.25,.46,.45,.94);
    }
    .prop-art:hover img { transform: scale(1.06); }

    /* Info overlay — always visible at bottom */
    .prop-art-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 48px 28px 28px;
      background: linear-gradient(transparent, rgba(14,13,10,.88));
    }
    .prop-art-loc {
      font-size: 9px; letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(247,244,239,.35);
      margin-bottom: 8px;
    }
    .prop-art-name {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(24px, 2.5vw, 34px);
      color: var(--paper); line-height: 1;
      margin-bottom: 10px;
    }
    .prop-art-rent {
      font-size: 12px; color: rgba(247,244,239,.45);
      letter-spacing: .04em;
    }

    /* Hover reveal: link */
    .prop-art-hover {
      position: absolute;
      inset: 0;
      background: rgba(14,13,10,.35);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity .35s;
    }
    .prop-art:hover .prop-art-hover { opacity: 1; }
    .prop-art-link {
      font-size: 10px; letter-spacing: .14em;
      text-transform: uppercase; color: var(--paper);
      border: 1px solid rgba(247,244,239,.5);
      padding: 13px 28px;
      transition: background .2s, border-color .2s;
    }
    .prop-art-link:hover { background: var(--paper); color: var(--ink); border-color: var(--paper); }

    /* Status badge inside card */
    .prop-art-badge {
      position: absolute;
      top: 20px; left: 20px;
      font-size: 9px; letter-spacing: .12em;
      text-transform: uppercase; color: var(--paper);
      background: var(--orange); padding: 4px 10px;
    }
    .prop-art-badge.available { background: transparent; border: 1px solid rgba(247,244,239,.3); }
    .prop-art-badge.coming-soon { background: rgba(14,13,10,.6); }

    /* ─── CTA ───────────────────────────────────────────── */
    .cta-section {
      background: var(--paper);
      padding: 160px 56px;
      display: flex; align-items: center;
      border-top: 1px solid var(--rule);
    }
    .cta-inner { max-width: 1400px; margin: 0 auto; width: 100%; }
    .cta-h {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(80px, 15vw, 200px);
      line-height: .84;
      color: var(--ink);
      letter-spacing: -.04em;
      margin-bottom: 64px;
    }
    .cta-h em { font-style: italic; color: var(--muted); }
    .cta-link {
      display: inline-flex; align-items: center; gap: 16px;
      font-size: 11px; letter-spacing: .14em;
      text-transform: uppercase; color: var(--ink);
      border-bottom: 1px solid var(--ink);
      padding-bottom: 4px;
      transition: color .2s, border-color .2s;
    }
    .cta-link:hover { color: var(--orange); border-color: var(--orange); }

    /* ─── RESPONSIVE ────────────────────────────────────── */
    @media (max-width: 960px) {
      .hero { grid-template-columns: 1fr; grid-template-rows: 55vh 45vh; }
      .hero-h1 { font-size: clamp(72px, 15vw, 120px); }
      .numbers, .props-section, .cta-section { padding-left: 32px; padding-right: 32px; }
      .numbers-inner { grid-template-columns: 1fr; border-left: none; }
      .num-item { border-right: none; border-top: 1px solid var(--rule); padding: 56px 0; }
      .props-grid { grid-template-columns: 1fr 1fr; gap: 2px; }
      .cta-h { font-size: clamp(64px, 14vw, 120px); }
    }
    @media (max-width: 600px) {
      .hero { grid-template-rows: 60vh 40vh; }
      .hero-type { left: 20px; bottom: 40px; }
      .hero-h1 { font-size: clamp(64px, 18vw, 96px); }
      .hero-panel { display: none; }
      .nav-inner::after { display: none; }
      .numbers, .props-section, .cta-section { padding-left: 20px; padding-right: 20px; }
      .props-grid { grid-template-columns: 1fr; }
      .prop-art { aspect-ratio: 3/4; }
    }
  </style>
</head>
<body>
<div id="nav-mount"></div>

<!-- ── HERO ────────────────────────────────────────────── -->
<section class="hero">
  <div class="hero-panel">
    <div class="hero-panel-top">Est. 2026 · Bengaluru</div>
    <div class="hero-panel-bottom">
      <div class="hero-scroll-line"></div>
      <span class="hero-scroll-txt">scroll</span>
    </div>
  </div>
  <div class="hero-photo">
    <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=1600&q=92&fit=crop&crop=center"
         alt="Switch home interior">
  </div>
  <!-- Type over both panels -->
  <div class="hero-type">
    <h1 class="hero-h1">the<br><em>switch.</em></h1>
  </div>
</section>

<!-- ── NUMBERS ─────────────────────────────────────────── -->
<section class="numbers">
  <div class="numbers-inner" data-stagger>
    <div class="num-item">
      <div class="num-val">₹0</div>
      <div class="num-label">Broker fee</div>
    </div>
    <div class="num-item">
      <div class="num-val">1<em>mo</em></div>
      <div class="num-label">Deposit</div>
    </div>
    <div class="num-item">
      <div class="num-val">Day<em>one</em></div>
      <div class="num-label">Move-in ready</div>
    </div>
  </div>
</section>

<!-- ── PROPERTIES ──────────────────────────────────────── -->
<section class="props-section">
  <div class="props-inner">
    <div class="props-eyebrow">
      <span>Our homes</span>
      <a href="/properties.html">View all →</a>
    </div>
    <div class="props-grid" id="propsGrid"></div>
  </div>
</section>

<!-- ── CTA ─────────────────────────────────────────────── -->
<section class="cta-section">
  <div class="cta-inner">
    <h2 class="cta-h anim">Walk<br><em>in.</em></h2>
    <a href="/properties.html" class="cta-link anim btn-mag">Book a viewing →</a>
  </div>
</section>

<div id="footer-mount"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/assets/js/supabase.js"></script>
<script src="/assets/js/animations.js"></script>
<script>
  document.getElementById('nav-mount').innerHTML    = navComponent();
  document.getElementById('footer-mount').innerHTML = footerComponent();

  function artBadge(status) {
    if (status === 'filling-fast') return `<span class="prop-art-badge">Filling fast</span>`;
    if (status === 'coming-soon')  return `<span class="prop-art-badge coming-soon">Coming soon</span>`;
    return `<span class="prop-art-badge available">Available</span>`;
  }

  async function loadProps() {
    const props = await getProperties();
    const el = document.getElementById('propsGrid');
    if (!el) return;
    el.innerHTML = props.slice(0, 3).map(p => {
      const img = getHeroImage(p.images);
      const slug = `/property/${p.slug}.html`;
      return `<a href="${slug}" class="prop-art">
        <img src="${img}" alt="${p.name}" loading="lazy">
        ${artBadge(p.status)}
        <div class="prop-art-info">
          <div class="prop-art-loc">${p.location}, ${p.area}</div>
          <div class="prop-art-name">${p.name}</div>
          <div class="prop-art-rent">${formatRentFrom(p)}</div>
        </div>
        <div class="prop-art-hover">
          <span class="prop-art-link">${p.status === 'coming-soon' ? 'Join waitlist' : 'View home'} →</span>
        </div>
      </a>`;
    }).join('');
  }

  loadProps();
  initFadeUp();
  initNav();
</script>
</body>
</html>

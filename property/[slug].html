<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property — the switch.</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    .prop-hero {
      padding-top: var(--nav-h);
      position: relative; height: 520px; overflow: hidden;
    }
    .prop-hero-img { width: 100%; height: 100%; object-fit: cover; }
    .prop-hero::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,.08) 0%, transparent 25%, rgba(0,0,0,.5) 70%, rgba(0,0,0,.82) 100%);
    }
    .prop-hero-info {
      position: absolute; bottom: 40px; left: 0; right: 0; z-index: 1;
    }
    .prop-hero-info .container { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; }

    /* ── Hero text — defaults to white (light theme) ── */
    .prop-name { font-family: var(--font-serif); font-size: clamp(40px, 6vw, 64px); margin-bottom: 8px; color: #fff; }
    .prop-loc { color: rgba(255,255,255,.75); font-size: 15px; display: flex; align-items: center; gap: 6px; }
    .prop-rent-box { text-align: right; flex-shrink: 0; }
    .prop-rent { font-size: 36px; font-weight: 500; color: #fff; }
    .prop-rent-meta { font-size: 13px; color: rgba(255,255,255,.6); margin-top: 4px; }

    /* ── Hero text — dark theme (bright images) ── */
    .prop-hero-info.hero-dark .prop-name { color: #111; text-shadow: 0 1px 6px rgba(255,255,255,.6); }
    .prop-hero-info.hero-dark .prop-loc { color: rgba(0,0,0,.7); }
    .prop-hero-info.hero-dark .prop-rent { color: #111; text-shadow: 0 1px 6px rgba(255,255,255,.6); }
    .prop-hero-info.hero-dark .prop-rent-meta { color: rgba(0,0,0,.55); }

    /* ── Gallery tabs ── */
    .gallery-section { padding-top: 40px; margin-bottom: 64px; }
    .gallery-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      margin-bottom: 28px; overflow-x: auto;
      scrollbar-width: none;
    }
    .gallery-tabs::-webkit-scrollbar { display: none; }
    .gallery-tab {
      font-size: 11px; letter-spacing: .1em; text-transform: uppercase; font-weight: 600;
      padding: 12px 24px; cursor: pointer; color: var(--muted);
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      white-space: nowrap; transition: color .15s, border-color .15s;
      flex-shrink: 0;
    }
    .gallery-tab:hover { color: var(--ink); }
    .gallery-tab.active { color: var(--orange); border-bottom-color: var(--orange); }

    /* ── Photo grid ── */
    .photo-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    }
    .photo-card { border-radius: var(--r-sm); overflow: hidden; background: var(--bg-3); aspect-ratio: 4/3; }
    .photo-card img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; transition: transform .35s; display: block; }
    .photo-card img:hover { transform: scale(1.05); }
    .photo-grid-empty { color: var(--muted); font-size: 13px; padding: 32px 0; }

    /* ── Content grid ── */
    .prop-content { display: grid; grid-template-columns: 1fr 380px; gap: 48px; align-items: start; }

    /* ── Detail sections ── */
    .detail-section { margin-bottom: 48px; }
    .detail-section h3 { font-family: var(--font-serif); font-size: 24px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .amenities-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .amenity-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; color: var(--cream-2); padding: 10px 0;
    }
    .amenity-check { color: var(--orange); font-size: 16px; }

    /* ── Flat type cards ── */
    .ft-cards { display: flex; flex-wrap: wrap; gap: 12px; }
    .ft-card {
      border: 1px solid var(--border); padding: 20px 24px; cursor: pointer;
      transition: border-color .2s, background .2s; min-width: 140px;
    }
    .ft-card:hover { border-color: var(--orange); }
    .ft-card-active { border-color: var(--orange); background: rgba(var(--orange-rgb,200,80,40),.06); }
    .ft-card-bhk { font-family: var(--font-serif); font-size: 20px; margin-bottom: 6px; }
    .ft-card-rent { font-size: 18px; font-weight: 500; color: var(--orange); }
    .ft-card-units { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: .04em; }

    /* ── Map ── */
    .prop-map { border-radius: var(--r-lg); overflow: hidden; border: 1px solid var(--border); margin-top: 12px; }
    .prop-map iframe { width: 100%; height: 300px; border: none; display: block; }

    /* ── Enquiry form ── */
    .enquiry-card {
      background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--r-lg);
      padding: 32px; position: sticky; top: calc(var(--nav-h) + 24px);
    }
    .enquiry-card h3 { font-family: var(--font-serif); font-size: 22px; margin-bottom: 6px; }
    .enquiry-card .sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .enquiry-form { display: flex; flex-direction: column; gap: 14px; }
    .form-success {
      display: none; text-align: center; padding: 24px;
      color: #4ade80; font-size: 15px;
    }
    .form-success-icon { font-size: 36px; margin-bottom: 12px; }

    /* ── Lightbox ── */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.92); align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: var(--r-md); object-fit: contain; }
    .lightbox-close {
      position: absolute; top: 20px; right: 20px;
      color: var(--cream); font-size: 28px; cursor: pointer;
    }
    .lightbox-prev, .lightbox-next {
      position: absolute; top: 50%; transform: translateY(-50%);
      color: var(--cream); font-size: 36px; cursor: pointer; padding: 12px;
      background: rgba(0,0,0,.4); border-radius: var(--r-sm);
    }
    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }

    @media (max-width: 900px) {
      .prop-content { grid-template-columns: 1fr; }
      .enquiry-card { position: static; }
      .photo-grid { grid-template-columns: repeat(2, 1fr); }
      .prop-hero-info .container { flex-direction: column; align-items: flex-start; }
      .prop-rent-box { text-align: left; }
    }
    @media (max-width: 500px) {
      .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 4px; }
      .gallery-tab { padding: 10px 16px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <div id="nav-mount"></div>

  <!-- Hero -->
  <div class="prop-hero">
    <img class="prop-hero-img" id="heroImg" src="" alt="" crossorigin="anonymous">
    <div class="prop-hero-info">
      <div class="container">
        <div>
          <div id="heroBadge"></div>
          <div class="prop-name" id="propName">Loading…</div>
          <div class="prop-loc" id="propLoc"></div>
        </div>
        <div class="prop-rent-box">
          <div class="prop-rent" id="propRent"></div>
          <div class="prop-rent-meta" id="propMeta"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Gallery -->
  <div class="container">
    <div class="gallery-section">
      <div class="gallery-tabs" id="galleryTabs"></div>
      <div class="photo-grid" id="photoGrid"></div>
    </div>
  </div>

  <!-- Content -->
  <div class="container" style="padding-bottom:80px">
    <div class="prop-content">
      <div>
        <!-- Flat type selector (hidden if only 1 type) -->
        <div class="detail-section fade-up" id="flatTypeSection" style="display:none">
          <h3>Choose your flat</h3>
          <div class="ft-cards" id="flatTypeCards"></div>
        </div>

        <!-- Description -->
        <div class="detail-section fade-up">
          <h3>About this property</h3>
          <p id="propDesc" style="color:var(--cream-2);font-size:15px;line-height:1.8"></p>
        </div>

        <!-- Amenities -->
        <div class="detail-section fade-up">
          <h3>What's included</h3>
          <div class="amenities-grid" id="amenitiesGrid"></div>
        </div>

        <!-- Map -->
        <div class="detail-section fade-up">
          <h3>Location</h3>
          <p style="font-size:13px;color:var(--muted);margin-bottom:12px">Find us on the map</p>
          <div class="prop-map"><iframe id="propMap" loading="lazy" allowfullscreen referrerpolicy="no-referrer-when-downgrade" title="Property location"></iframe></div>
        </div>
      </div>

      <!-- Enquiry form -->
      <div>
        <div class="enquiry-card fade-up">
          <h3 id="formTitle">Enquire now</h3>
          <p class="sub">We respond the same day. No broker involved.</p>
          <div class="enquiry-form" id="enquiryForm">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="eName" placeholder="Your name" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="ePhone" placeholder="+91 XXXXX XXXXX">
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" id="eEmail" placeholder="you@email.com">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Move-in Date</label>
                <input type="date" id="eMoveIn">
              </div>
              <div class="form-group">
                <label>Budget / mo</label>
                <select id="eBudget">
                  <option value="">Select range</option>
                  <option>Under ₹20,000</option>
                  <option>₹20,000 – ₹25,000</option>
                  <option>₹25,000 – ₹30,000</option>
                  <option>₹30,000 – ₹35,000</option>
                  <option>₹35,000+</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>Message (optional)</label>
              <textarea id="eMessage" rows="3" placeholder="Anything you'd like us to know…"></textarea>
            </div>
            <button class="form-submit" id="enquirySubmit" onclick="submitForm()">Send enquiry →</button>
          </div>
          <div class="form-success" id="formSuccess">
            <div class="form-success-icon">✓</div>
            <strong>We've got your message.</strong><br>
            <span style="color:var(--muted);font-size:13px">Expect a reply from us within the day. No broker will call you.</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" onclick="closeLightbox()">×</span>
    <span class="lightbox-prev" onclick="lightboxNav(-1)">‹</span>
    <img id="lightboxImg" src="" alt="">
    <span class="lightbox-next" onclick="lightboxNav(1)">›</span>
  </div>

  <div id="footer-mount"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/assets/js/supabase.js"></script>
  <script>
    document.getElementById('nav-mount').innerHTML = navComponent('Properties');
    document.getElementById('footer-mount').innerHTML = footerComponent();

    // Get slug from URL: /property/switch-volt.html → switch-volt
    const slug = location.pathname.split('/').pop().replace('.html','');

    let propImages = [];
    let lightboxIdx = 0;

    async function loadProperty() {
      const p = await getProperty(slug);
      if (!p) { document.getElementById('propName').textContent = 'Property not found'; return; }

      document.title = `${p.name} — the switch.`;
      const rawImages = p.images || [];
      // Find hero image (is_hero flag), fall back to first
      const heroRaw = rawImages.find(img => img.is_hero || img.isHero) || rawImages[0];
      const heroUrl = typeof heroRaw === 'string' ? heroRaw : (heroRaw?.url || '');
      // All images as URL strings, hero first
      const allUrls = rawImages.map(img => typeof img === 'string' ? img : (img.url || '')).filter(Boolean);
      if (heroUrl && allUrls[0] !== heroUrl) {
        const hi = allUrls.indexOf(heroUrl);
        if (hi > 0) { allUrls.splice(hi, 1); allUrls.unshift(heroUrl); }
      }
      propImages = allUrls;

      // Hero
      const heroImgEl = document.getElementById('heroImg');
      heroImgEl.alt = p.name;
      heroImgEl.onload = function() {
        try {
          const canvas = document.createElement('canvas');
          canvas.width = 80; canvas.height = 30;
          const ctx = canvas.getContext('2d');
          // Sample the bottom 35% of the image — where the text lives
          const srcY = heroImgEl.naturalHeight * 0.65;
          const srcH = heroImgEl.naturalHeight * 0.35;
          ctx.drawImage(heroImgEl, 0, srcY, heroImgEl.naturalWidth, srcH, 0, 0, 80, 30);
          const d = ctx.getImageData(0, 0, 80, 30).data;
          let lum = 0;
          for (let i = 0; i < d.length; i += 4) lum += 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
          lum /= (d.length / 4);
          // If background is bright (>145) after gradient → use dark text
          if (lum > 145) document.querySelector('.prop-hero-info').classList.add('hero-dark');
        } catch(e) { /* CORS fallback — keep white text */ }
      };
      heroImgEl.src = heroUrl || 'https://images.unsplash.com/photo-1560448204-603b3fc33ddc?w=1600&q=80';
      document.getElementById('heroBadge').innerHTML = statusBadge(p.status);
      document.getElementById('propName').textContent = p.name;
      document.getElementById('propLoc').innerHTML = `<svg width="10" height="12" viewBox="0 0 10 12" fill="none"><path d="M5 0C2.24 0 0 2.24 0 5c0 3.75 5 7 5 7s5-3.25 5-7c0-2.76-2.24-5-5-5zm0 6.5A1.5 1.5 0 115 3.5a1.5 1.5 0 010 3z" fill="currentColor"/></svg>${p.location}, ${p.area}`;
      document.getElementById('propRent').textContent = formatRentFrom(p);
      document.getElementById('propMeta').textContent = `${getBhkLabel(p)} · ${getTotalUnits(p)} flats`;

      // Gallery — tabbed by image tag
      const TAG_LABELS = { 'living-room':'Living Room', bedroom:'Bedroom', kitchen:'Kitchen', bathroom:'Bathroom', balcony:'Balcony', 'common-area':'Common Area', building:'Building', other:'Other' };
      const uniqueTags = [...new Set(rawImages.map(img => img.tag || 'other'))];

      function renderPhotoGrid(filterTag) {
        const filtered = filterTag === 'all' ? rawImages : rawImages.filter(img => (img.tag || 'other') === filterTag);
        document.getElementById('photoGrid').innerHTML = filtered.length
          ? filtered.map((img, i) => {
              const url = typeof img === 'string' ? img : img.url;
              const lightIdx = propImages.indexOf(url);
              return `<div class="photo-card"><img src="${url}" alt="${p.name} photo ${i+1}" loading="${i>0?'lazy':'eager'}" onclick="openLightbox(${lightIdx >= 0 ? lightIdx : i})"></div>`;
            }).join('')
          : `<p class="photo-grid-empty">No photos in this category.</p>`;
      }

      window.switchGalleryTab = function(tag, el) {
        document.querySelectorAll('.gallery-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderPhotoGrid(tag);
      };

      const tabs = [{ tag: 'all', label: 'All Photos' }, ...uniqueTags.map(t => ({ tag: t, label: TAG_LABELS[t] || t }))];
      document.getElementById('galleryTabs').innerHTML = tabs.map((t, i) =>
        `<div class="gallery-tab${i === 0 ? ' active' : ''}" onclick="switchGalleryTab('${t.tag}', this)">${t.label}</div>`
      ).join('');
      renderPhotoGrid('all');

      // Description
      document.getElementById('propDesc').textContent = p.description;

      // Flat type selector
      const flatTypes = getFlatTypes(p);
      const ftSection = document.getElementById('flatTypeSection');
      if (flatTypes.length > 1) {
        ftSection.style.display = '';
        let selectedFt = 0;
        function renderFtCards() {
          document.getElementById('flatTypeCards').innerHTML = flatTypes.map((ft, i) => `
            <div class="ft-card ${i === selectedFt ? 'ft-card-active' : ''}" onclick="selectFt(${i})">
              <div class="ft-card-bhk">${ft.bhk}</div>
              <div class="ft-card-rent">${formatRent(ft.rent)}</div>
              ${ft.units ? `<div class="ft-card-units">${ft.units} unit${ft.units>1?'s':''}</div>` : ''}
            </div>
          `).join('');
        }
        window.selectFt = function(i) {
          selectedFt = i;
          document.getElementById('propRent').textContent = formatRent(flatTypes[i].rent);
          renderFtCards();
        };
        renderFtCards();
      }

      // Amenities
      document.getElementById('amenitiesGrid').innerHTML = (p.amenities||[]).map(a => `
        <div class="amenity-item"><span class="amenity-check">✓</span>${a}</div>
      `).join('');

      // Map
      if (p.map_embed) document.getElementById('propMap').src = p.map_embed;

      // Form title
      if (p.status === 'coming-soon') {
        document.getElementById('formTitle').textContent = 'Join the waitlist';
        document.getElementById('enquirySubmit').textContent = 'Join waitlist →';
      }

      initFadeUp();
    }

    async function submitForm() {
      const name    = document.getElementById('eName').value.trim();
      const phone   = document.getElementById('ePhone').value.trim();
      const email   = document.getElementById('eEmail').value.trim();
      const moveIn  = document.getElementById('eMoveIn').value;
      const budget  = document.getElementById('eBudget').value;
      const message = document.getElementById('eMessage').value.trim();

      if (!name || (!phone && !email)) {
        alert('Please fill in your name and at least phone or email.');
        return;
      }

      const btn = document.getElementById('enquirySubmit');
      btn.textContent = 'Sending…'; btn.disabled = true;

      const result = await submitEnquiry({ name, phone, email, move_in_date: moveIn, budget, message, property_slug: slug, created_at: new Date().toISOString() });

      if (result.ok) {
        document.getElementById('enquiryForm').style.display = 'none';
        document.getElementById('formSuccess').style.display = 'block';
      } else {
        btn.textContent = 'Send enquiry →'; btn.disabled = false;
        alert('Something went wrong. Please try again or WhatsApp us.');
      }
    }

    // Lightbox
    function openLightbox(idx) {
      lightboxIdx = idx;
      document.getElementById('lightboxImg').src = propImages[idx];
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
    function lightboxNav(dir) {
      lightboxIdx = (lightboxIdx + dir + propImages.length) % propImages.length;
      document.getElementById('lightboxImg').src = propImages[lightboxIdx];
    }
    document.getElementById('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); if (e.key === 'ArrowRight') lightboxNav(1); if (e.key === 'ArrowLeft') lightboxNav(-1); });

    loadProperty();
    initNav();
  </script>
</body>
</html>
